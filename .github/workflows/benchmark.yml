name: Benchmark

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      top_models:
        description: "Comma-separated model IDs to benchmark (leave blank to use bench.config.json)"
        required: false
        default: ""

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  run-benchmark:
    name: "Run Benchmark"
    runs-on: ubuntu-latest
    if: ${{ true }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run eval (standard + λ-RLM) + build results.json
        run: bun --filter=server run start run build
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TOP_MODELS: ${{ github.event.inputs.top_models }}

      - name: Upload results.json
        uses: actions/upload-artifact@v4
        with:
          name: results-json
          path: apps/client/public/data/results.json

  deploy:
    name: "Deploy to GitHub Pages"
    needs: [run-benchmark]
    if: ${{ always() && (needs.run-benchmark.result == 'success' || needs.run-benchmark.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Download results.json
        if: needs.run-benchmark.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: results-json
          path: apps/client/public/data/

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build client
        run: bun run build --filter=client
        env:
          VITE_BASE_URL: /${{ github.event.repository.name }}/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/client/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
